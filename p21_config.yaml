v4:
    SIZE: 299
    LEARNING_RATE: 1e-4
    NUM_EPOCHS: 80
    MODEL: 'xception'                    
    BALANCE_CLASS_WEIGHT: 1.5           
    BALANCE_SAMPLES: 0
    DROPOUT_RATE: 0.5
    OUT_BINS: 2
    BATCH_SIZE: 32
    TRAIN_SUBSET: 1.0
    ENSEMBLE: 1
    WEIGHT_DECAY: 1e-4                   
    BALANCE_CLASSES: True
    FREEZE_BACKBONE: False

    train_augmentations:
        resize_and_pad: True
        random_rotation: 180
        horizontal_flip: True
        vertical_flip: True
        color_jitter: True
        color_jitter_params:
            brightness: 0.25
            contrast: 0.25
            saturation: 0.25
            hue: 0.12
        random_affine: False               # translation + scale
        random_perspective: False          # p=0.3
        random_erasing: False              # p=0.2
        normalize: True
        normalize_mean: [0.5, 0.5, 0.5]
        normalize_std: [0.5, 0.5, 0.5]

    val_augmentations:
        resize_and_pad: True
        normalize: True
        normalize_mean: [0.5, 0.5, 0.5]
        normalize_std: [0.5, 0.5, 0.5]


