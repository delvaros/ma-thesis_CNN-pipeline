v1:
    # Variables
    SIZE: 70
    LEARNING_RATE: 1e-4
    NUM_EPOCHS: 40
    MODEL: 'xception'
    BBOX_TYPE: 'RAW'
    
    # untouched
    BALANCE_CLASS_WEIGHT: 1
    BALANCE_SAMPLES: 0
    DROPOUT_RATE: 0.3
    OUT_BINS: 2
    BATCH_SIZE: 16
    TRAIN_SUBSET: 0.8
    ENSEMBLE: 1
    WEIGHT_DECAY: 1e-6
    
    # Image augmentations
    train_augmentations:
        # Resize options
        resize: false
        center_crop: false
        random_resized_crop: false
        random_resized_crop_scale: [0.8, 1.0]
        resize_and_pad: True  

        # Geometric augmentations
        random_rotation: 180
        horizontal_flip: True
        vertical_flip: True

        # Color / blur
        color_jitter: false
        color_jitter_params:
            brightness: 0.2
            contrast: 0.2
            saturation: 0.2
            hue: 0.2

        gaussian_blur: false
        gaussian_blur_kernel: 9
        gaussian_blur_sigma: [0.1, 4.0]

        fast_gaussian_blur: false
        fast_gaussian_blur_kernel: 9
        fast_gaussian_blur_sigma: 4

        sharpen: false  # lambda sharpen function

        # RandomApply / RandomChoice
        random_apply_gaussian: false
        random_apply_p: 0.5

        random_choice: false

        # Normalize
        normalize: false
        normalize_mean: [0.485, 0.456, 0.406]
        normalize_std: [0.229, 0.224, 0.225]

    val_augmentations:
        resize_and_pad: True  
        # Geometric augmentations
        random_rotation: 180
        horizontal_flip: True
        vertical_flip: True

