    BBOX_TYPE: 'RAW'

    BALANCE_CLASS_WEIGHT: 0
    BALANCE_SAMPLES: 0
    DROPOUT_RATE: 0.3
    OUT_BINS: 2
    BATCH_SIZE: 32                             # smaller model = can afford bigger batches
    TRAIN_SUBSET: 1.0
    ENSEMBLE: 1
    WEIGHT_DECAY: 1e-5                         # slightly stronger regularization
    BALANCE_CLASSES: True

    train_augmentations:
        resize_and_pad: True
        random_rotation: 180
        horizontal_flip: True
        vertical_flip: True
        color_jitter: True
        color_jitter_params:
